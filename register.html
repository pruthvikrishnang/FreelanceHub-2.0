<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - FreelanceHub</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<section class="login-page">

<form class="login-container" id="registerForm">
<div
style="
display:flex;
justify-content:flex-end;
margin-bottom:10px;
">

<button
type="button"
id="themeToggle"
class="theme-toggle">

<i class="fa-solid fa-moon"></i>

</button>

</div>
<h1>Create Account</h1>

<p>Join FreelanceHub today</p>

<div class="form-message" id="registerMessage"></div>

<div class="input-group">
<input type="text" id="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="input-group">

<select id="role" required>

<option value="">Select Role</option>

<option value="Freelancer">
Freelancer
</option>

<option value="Recruiter">
Recruiter
</option>

</select>

</div>

<!-- FREELANCER FIELDS -->

<div class="role-fields" id="freelancerFields">

<div class="input-group">
<input type="text" id="title" placeholder="Professional Title">
</div>

<div class="input-group">
<input type="text" id="city" placeholder="City">
</div>

<div class="input-group">

<label for="bio">
Bio (Max 100 Characters)
</label>

<textarea
id="bio"
placeholder="Enter your bio"
maxlength="100"
></textarea>

<small id="bioCount">0/100</small>

</div>

<div class="input-group">
<input type="number" id="hourly_rate" placeholder="Hourly Rate">
</div>

<div class="input-group">
<input type="number" id="experience_years" placeholder="Experience Years">
</div>

<div class="input-group">

<select id="category">

<option value="">Select Category</option>

<option>Development</option>
<option>Design</option>
<option>Writing</option>
<option>Marketing</option>
<option>Media</option>
<option>Data</option>

</select>

</div>

<div class="input-group">
<input type="text" id="skills"
placeholder="Skills (comma separated)">
</div>

<div class="input-group">
<input type="text" id="location"
placeholder="Location">
</div>

</div>

<div class="role-fields hidden" id="recruiterFields">

<div class="input-group">
<input type="text" id="company_name" placeholder="Company Name">
</div>

<div class="input-group">
<input type="text" id="industry" placeholder="Industry">
</div>

</div>

<button type="submit">
Register
</button>

</form>

</section>

<script>

document.getElementById("registerForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const message =
document.getElementById("registerMessage");

message.innerText = "Creating your account...";

const userData = {

full_name:
document.getElementById("name").value,

email:
document.getElementById("email").value,

password:
document.getElementById("password").value,

role:
document.getElementById("role").value,

title:
document.getElementById("title").value,

city:
document.getElementById("city").value,

bio:
document.getElementById("bio").value,

hourly_rate:
document.getElementById("hourly_rate").value,

experience_years:
document.getElementById("experience_years").value,

category:
document.getElementById("category").value,

skills:
document.getElementById("skills").value,

location:
document.getElementById("location").value,

company_name:
document.getElementById("company_name").value,

industry:
document.getElementById("industry").value

};

const response = await fetch(
window.API_BASE + "/register",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(userData)

});

const data = await response.json();

if(data.success){

localStorage.setItem(
"currentUser",
JSON.stringify(data.user)
);

message.innerText = "Registration successful";

window.location.href = "dashboard.html";

}
else{

message.innerText = data.message;

}

});

const bio =
document.getElementById("bio");

const bioCount =
document.getElementById("bioCount");

bio.addEventListener("input", function(){

bioCount.innerText =
bio.value.length + "/100";

});

const roleSelect =
document.getElementById("role");

const freelancerFields =
document.getElementById("freelancerFields");

const recruiterFields =
document.getElementById("recruiterFields");

roleSelect.addEventListener("change", function(){

updateRoleFields();

});

function updateRoleFields(){

const isRecruiter =
roleSelect.value === "Recruiter";

freelancerFields.classList.toggle(
"hidden",
isRecruiter
);

recruiterFields.classList.toggle(
"hidden",
!isRecruiter
);

freelancerFields
.querySelectorAll("input, select, textarea")
.forEach(field => {
field.disabled = isRecruiter;
});

recruiterFields
.querySelectorAll("input, select, textarea")
.forEach(field => {
field.disabled = !isRecruiter;
});

}

updateRoleFields();
</script>

<script src="app.js"></script>

</body>
</html>
