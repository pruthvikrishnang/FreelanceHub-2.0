<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - FreelanceHub</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<header class="navbar">

<div class="nav-container">

<a href="index.html" class="logo">
<i class="fa-solid fa-briefcase"></i>
Freelancer - Client <span>Matchmaking</span>
</a>

<nav class="nav-links">

<a href="index.html">Home</a>

<a href="browse.html">Browse Freelancers</a>

<a href="projects.html">Projects</a>

<a href="how-it-works.html">How It Works</a>

</nav>

<div class="nav-right">
<a href="login.html" class="signin-btn">Sign In</a>
<a href="#" class="post-btn">
Post a Project
</a>

</div>

</div>

</header>

<section class="login-page">

<form class="login-container" id="loginForm">

<h1>Welcome Back</h1>

<p>Login to continue to FreelanceHub</p>

<div class="input-group">

<input
type="email"
id="email"
placeholder="Enter Email"
required
>

<small id="emailError"></small>

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="Enter Password"
required
>

<small id="passwordError"></small>

</div>

<div class="input-group">

<select id="role" required>

<option value="">Select Role</option>

<option>Student / Freelancer</option>

<option>Business / Recruiter</option>

</select>

<small id="roleError"></small>

</div>

<button type="submit">
Login
</button>

<p class="login-bottom-text">
Don't have an account?
<a href="#">Register</a>
</p>

</form>

</section>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", function(e){

e.preventDefault();

let isValid = true;

const email = document.getElementById("email");
const password = document.getElementById("password");
const role = document.getElementById("role");

const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const roleError = document.getElementById("roleError");

emailError.innerText = "";
passwordError.innerText = "";
roleError.innerText = "";

const emailPattern =
/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(email.value.trim() === ""){

emailError.innerText = "Email is required";
isValid = false;

}
else if(!email.value.match(emailPattern)){

emailError.innerText = "Enter valid email";
isValid = false;

}

if(password.value.trim() === ""){

passwordError.innerText = "Password is required";
isValid = false;

}
else if(password.value.length < 6){

passwordError.innerText =
"Password must be at least 6 characters";

isValid = false;

}

if(role.value === ""){

roleError.innerText = "Please select role";
isValid = false;

}

if(isValid){

alert("Login Successful!");

window.location.href = "index.html";

}

});

</script>

</body>
</html>
